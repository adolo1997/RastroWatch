services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rastrowatch}
      POSTGRES_USER: ${POSTGRES_USER:-rastrowatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rastrowatch}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rastrowatch} -d ${POSTGRES_DB:-rastrowatch}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rastrowatch}:${POSTGRES_PASSWORD:-rastrowatch}@postgres:5432/${POSTGRES_DB:-rastrowatch}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-cambia-esta-clave}
      SESSION_SECRET: ${SESSION_SECRET:-cambia-este-secreto-largo}
      UPLOADS_DIR: /app/uploads
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      EBAY_CLIENT_ID: ${EBAY_CLIENT_ID:-}
      EBAY_CLIENT_SECRET: ${EBAY_CLIENT_SECRET:-}
      EBAY_MARKETPLACE: ${EBAY_MARKETPLACE:-EBAY_ES}
      THEWATCHAPI_KEY: ${THEWATCHAPI_KEY:-}
      WATCHCHARTS_API_KEY: ${WATCHCHARTS_API_KEY:-}
      APIFY_TOKEN: ${APIFY_TOKEN:-}
      APIFY_WALLAPOP_ACTOR_ID: ${APIFY_WALLAPOP_ACTOR_ID:-}
      APIFY_MILANUNCIOS_ACTOR_ID: ${APIFY_MILANUNCIOS_ACTOR_ID:-}
      APIFY_CATAWIKI_ACTOR_ID: ${APIFY_CATAWIKI_ACTOR_ID:-}
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8085:80"
    depends_on:
      - backend

volumes:
  postgres_data:
